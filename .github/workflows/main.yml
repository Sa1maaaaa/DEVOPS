name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: devops-application
          path: target/*.jar

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t devops-app:latest .

      - name: List Docker image
        run: docker images | grep devops-app

  kubernetes-check:
    runs-on: ubuntu-latest
    name: Kubernetes Validation
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if k8s_deployment.yaml exists
        run: |
          if [ -f k8s_deployment.yaml ]; then
            echo "✓ k8s_deployment.yaml found"
          else
            echo "✗ k8s_deployment.yaml not found"
            exit 1
          fi

      - name: Display k8s_deployment.yaml content
        run: cat k8s_deployment.yaml

      - name: Validate YAML syntax
        run: |
          python3 -c "
          import yaml
          try:
              with open('k8s_deployment.yaml', 'r') as f:
              list(yaml.safe_load_all(f))
              print('✓ YAML syntax is valid')
          except yaml.YAMLError as e:
              print(f'✗ YAML syntax error: {e}')
              exit(1)
          "
